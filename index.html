<!DOCTYPE html>

  <meta charset="utf-8">
  <title>2026全国大会 席次検索</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      max-width: 1400px; margin: 0 auto; padding: 20px; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .header { 
      text-align: center; 
      color: white; 
      margin-bottom: 30px; 
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .search-box { 
      width: 100%; 
      padding: 20px 25px; 
      font-size: 20px; 
      border: none; 
      border-radius: 15px; 
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      margin-bottom: 25px;
    }
    .instructions { 
      background: rgba(255,255,255,0.95); 
      padding: 20px; 
      border-radius: 15px; 
      margin-bottom: 30px; 
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .seating-table { 
      display: grid; 
      grid-template-columns: repeat(27, 1fr); 
      gap: 3px; 
      background: rgba(255,255,255,0.1); 
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .seat { 
      background: rgba(255,255,255,0.9); 
      padding: 12px 8px; 
      text-align: center; 
      min-height: 65px; 
      font-size: 11px; 
      font-weight: 600;
      border-radius: 10px; 
      transition: all 0.3s ease; 
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .seat:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .highlight { 
      background: linear-gradient(45deg, #ffeb3b, #ff9800) !important; 
      box-shadow: 0 0 30px rgba(255,235,59,0.9) !important;
      transform: scale(1.1) !important;
      animation: pulse 1s infinite;
      border: 3px solid #f57c00;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(255,235,59,0.9); }
      50% { box-shadow: 0 0 40px rgba(255,235,59,1); }
    }
    .loading { 
      text-align: center; 
      padding: 60px 20px; 
      font-size: 18px; 
      color: white; 
      background: rgba(255,255,255,0.2);
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }
    @media (max-width: 768px) { 
      .seating-table { grid-template-columns: repeat(14, 1fr); gap: 2px; padding: 15px; }
      .seat { font-size: 9px; min-height: 50px; padding: 8px 4px; }
    }
  </style>
</head>

    // ページ読み込み時に席次表表示
    window.onload = function() {
      displaySeating();
    };
    
    // 検索機能
    document.getElementById('searchInput').addEventListener('input', function() {
      const query = this.value.toLowerCase().trim();
      document.querySelectorAll('.seat').forEach(seat => {
        seat.classList.remove('highlight');
        if (query && seat.dataset.store && 
            seat.dataset.store.toLowerCase().includes(query)) {
          seat.classList.add('highlight');
          seat.scrollIntoView({ 
            behavior: 'smooth', 
            block: 'center',
            inline: 'nearest'
          });
        }
      });
    });
    
    // 席次表描画
    function displaySeating() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('seatingTable').style.display = 'grid';
      
      const table = document.getElementById('seatingTable');
      const rowLabels = ['A','B','C','D','E','F','G','H','I','J','k','l','m','n','o'];
      
      rowLabels.forEach(row => {
        for(let col = 1; col <= 27; col++) {
          const seatId = row + '-' + col;
          const seat = document.createElement('div');
          seat.className = 'seat';
          
          // 席データ取得
          const seatData = seatingData.find(s => s.seat === seatId);
          if (seatData) {
            seat.innerHTML = `
              <div>${seatData.store}</div>
              <small>${seatId}</small>
            `;
            seat.dataset.store = seatData.store;
            seat.onclick = () => alert(`${seatData.store}\n席番号：${seatId}`);
          } else {
            seat.innerHTML = `<small>${seatId}</small>`;
            seat.dataset.store = '';
            seat.onclick = () => alert(`空席または通路\n${seatId}`);
          }
          seat.dataset.seatId = seatId;
          
          table.appendChild(seat);
        }
      });
    }
  </script>
