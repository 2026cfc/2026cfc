  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 15px;
    }
    .header { 
      text-align: center; 
      color: white; 
      margin-bottom: 25px; 
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .search-box { 
      width: 100%; 
      padding: 18px 20px; 
      font-size: 18px; 
      border: none; 
      border-radius: 15px; 
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      margin-bottom: 20px;
      background: rgba(255,255,255,0.95);
    }
    .instructions { 
      background: rgba(255,255,255,0.9); 
      padding: 15px; 
      border-radius: 12px; 
      margin-bottom: 20px; 
      text-align: center;
      font-size: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }
    
    .seating-container {
      background: rgba(255,255,255,0.15); 
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
      padding: 20px;
      margin-bottom: 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    .row-group {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
      min-width: max-content;
      align-items: center;
    }
    
    .aisle-space {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      background: transparent;
    }
    
    .seat { 
      background: rgba(255,255,255,0.92); 
      width: 52px; 
      height: 52px; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 9px; 
      font-weight: 600;
      border-radius: 8px; 
      transition: all 0.25s ease; 
      cursor: pointer;
      position: relative;
      border: 2px solid transparent;
    }
    
    .seat:hover { 
      transform: scale(1.08); 
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    
    .highlight { 
      background: linear-gradient(45deg, #ffeb3b, #ff9800) !important; 
      box-shadow: 0 0 25px rgba(255,235,59,0.9) !important;
      transform: scale(1.15) !important;
      animation: pulse 0.8s infinite;
      border-color: #f57c00 !important;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 25px rgba(255,235,59,0.9); }
      50% { box-shadow: 0 0 35px rgba(255,235,59,1); }
    }
    
    .seat-name { 
      font-size: 8px; 
      line-height: 1.1; 
      max-width: 44px;
      text-align: center;
      word-break: break-all;
      margin-bottom: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .seat-id { 
      font-size: 7px; 
      opacity: 0.8;
    }
    
    .loading { 
      text-align: center; 
      padding: 50px 15px; 
      font-size: 16px; 
      color: white; 
      background: rgba(255,255,255,0.2);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      margin: 20px 0;
    }
    
    @media (max-width: 480px) { 
      body { padding: 10px; }
      .seat, .aisle-space { width: 48px; height: 48px; }
      .seat-name { font-size: 7.5px; }
      .seat-id { font-size: 6.5px; }
      .row-group { gap: 3px; margin-bottom: 6px; }
    }
  </style>
</head>
