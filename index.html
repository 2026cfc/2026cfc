<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026全国大会 席次検索</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 15px;
    }
    .header { 
      text-align: center; 
      color: white; 
      margin-bottom: 25px; 
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .search-box { 
      width: 100%; 
      padding: 18px 20px; 
      font-size: 18px; 
      border: none; 
      border-radius: 15px; 
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      margin-bottom: 20px;
      background: rgba(255,255,255,0.95);
    }
    .instructions { 
      background: rgba(255,255,255,0.9); 
      padding: 15px; 
      border-radius: 12px; 
      margin-bottom: 20px; 
      text-align: center;
      font-size: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }
    
    .seating-container {
      background: rgba(255,255,255,0.15); 
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
      padding: 20px;
      margin-bottom: 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    .row-group {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
      min-width: max-content;
      align-items: center;
    }
    
    .aisle-space {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      background: transparent;
    }
    
    .seat { 
      background: rgba(255,255,255,0.92); 
      width: 52px; 
      height: 52px; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 9px; 
      font-weight: 600;
      border-radius: 8px; 
      transition: all 0.25s ease; 
      cursor: pointer;
      position: relative;
      border: 2px solid transparent;
    }
    
    .seat:hover { 
      transform: scale(1.08); 
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    
    .highlight { 
      background: linear-gradient(45deg, #ffeb3b, #ff9800) !important; 
      box-shadow: 0 0 25px rgba(255,235,59,0.9) !important;
      transform: scale(1.15) !important;
      animation: pulse 0.8s infinite;
      border-color: #f57c00 !important;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 25px rgba(255,235,59,0.9); }
      50% { box-shadow: 0 0 35px rgba(255,235,59,1); }
    }
    
    .seat-name { 
      font-size: 8px; 
      line-height: 1.1; 
      max-width: 44px;
      text-align: center;
      word-break: break-all;
      margin-bottom: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .seat-id { 
      font-size: 7px; 
      opacity: 0.8;
    }
    
    .loading { 
      text-align: center; 
      padding: 50px 15px; 
      font-size: 16px; 
      color: white; 
      background: rgba(255,255,255,0.2);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      margin: 20px 0;
    }
    
    @media (max-width: 480px) { 
      body { padding: 10px; }
      .seat, .aisle-space { width: 48px; height: 48px; }
      .seat-name { font-size: 7.5px; }
      .seat-id { font-size: 6.5px; }
      .row-group { gap: 3px; margin-bottom: 6px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 style="font-size: 2.2em; margin-bottom: 5px;">🏛️ 2026全国大会</h1>
    <h2 style="font-size: 1.3em;">席次検索</h2>
  </div>
  
  <div class="instructions">
    📱 <strong>店舗名を入力</strong>すると該当席が<strong>黄色で点滅</strong><br>
    横スワイプで席を確認（隙間＝通路）
  </div>
  
  <input type="text" class="search-box" id="searchInput" 
         placeholder="店舗名を入力（例：岡崎店、本社）"
         autocomplete="off">
  
  <div id="loading" class="loading">
    🎯 席次表を読み込み中...
  </div>
  <div id="seatingContainer" class="seating-container" style="display:none;"></div>

  <script>
    const seatingData = [
      {"seat":"A-1","store":"岡崎店"},
      {"seat":"A-2","store":"岡崎店"},
      {"seat":"A-3","store":"岡崎店"},
      {"seat":"A-4","store":"仙台東店"},
      {"seat":"A-5","store":"仙台東店"},
      {"seat":"B-1","store":"掛川店"},
      {"seat":"B-2","store":"掛川店"},
      {"seat":"B-3","store":"掛川店"}
      // 全席データ
    ];
    
    window.onload = function() {
      displaySeating();
    };
    
    document.getElementById('searchInput').addEventListener('input', function() {
      const query = this.value.toLowerCase().trim();
      document.querySelectorAll('.seat').forEach(seat => {
        seat.classList.remove('highlight');
        if (query && seat.dataset.store && 
            seat.dataset.store.toLowerCase().includes(query)) {
          seat.classList.add('highlight');
          seat.scrollIntoView({ 
            behavior: 'smooth', 
            block: 'center',
            inline: 'nearest'
          });
        }
      });
    });
    
    function displaySeating() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('seatingContainer').style.display = 'block';
      
      const container = document.getElementById('seatingContainer');
      const rowLabels = ['A','B','C','D','E','F','G','H','I','J','k','l','m','n','o'];
      
      rowLabels.forEach(row => {
        const rowGroup = document.createElement('div');
        rowGroup.className = 'row-group';
        
        let seatCol = 1;
        
        for(let displayCol = 1; displayCol <= 29; displayCol++) {
          // 通路判定
          const isAisle1 = (displayCol === 10);  // 9-10間通路
          const isAisle2 = (displayCol === 20);  // 18-19間通路  
          
          // J列終了後の横通路（k列開始前）
          const isHorizontalAisle = (row === 'J' && displayCol === 28);
          
          if (isAisle1 || isAisle2 || isHorizontalAisle) {
            const aisleSpace = document.createElement('div');
            aisleSpace.className = 'aisle-space';
            rowGroup.appendChild(aisleSpace);
          } else {
            const seatId = row + '-' + seatCol;
            const seat = document.createElement('div');
            seat.className = 'seat';
            
            const seatData = seatingData.find(s => s.seat === seatId);
            if (seatData) {
              seat.innerHTML = `
                <div class="seat-name">${seatData.store}</div>
                <div class="seat-id">${seatId}</div>
              `;
              seat
